<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripple Button Demo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#eef3ff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:400px;
padding:20px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.btn{
height:75px;
border:none;
border-radius:20px;
background:white;
font-size:28px;
font-weight:700;
color:#234c9f;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.08);

position:relative;
overflow:hidden;

transition:transform .15s ease;
}

.btn:active{
transform:scale(.95);
}

.ripple{
position:absolute;
border-radius:50%;
background:rgba(35,76,159,.25);
transform:scale(0);
pointer-events:none;
animation:ripple .6s ease-out;
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

</style>
</head>
<body>

<div class="container">

<div class="keypad">
<button class="btn">1</button>
<button class="btn">2</button>
<button class="btn">3</button>

<button class="btn">4</button>
<button class="btn">5</button>
<button class="btn">6</button>

<button class="btn">7</button>
<button class="btn">8</button>
<button class="btn">9</button>

<div></div>
<button class="btn">0</button>
<div></div>
</div>

</div>

<script>

function createRipple(event){

const button = event.currentTarget;

const ripple = document.createElement("span");

const diameter = Math.max(
button.clientWidth,
button.clientHeight
);

const radius = diameter / 2;

ripple.classList.add("ripple");

ripple.style.width =
ripple.style.height =
`${diameter}px`;

ripple.style.left =
`${event.clientX -
button.getBoundingClientRect().left -
radius}px`;

ripple.style.top =
`${event.clientY -
button.getBoundingClientRect().top -
radius}px`;

const oldRipple =
button.querySelector(".ripple");

if(oldRipple){
oldRipple.remove();
}

button.appendChild(ripple);

}

document
.querySelectorAll(".btn")
.forEach(button=>{

button.addEventListener(
"click",
createRipple
);

});

</script>

</body>
</html>
